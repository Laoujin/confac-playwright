version: '3.8'

# Full containerized setup for CI/CD
# Builds backend and frontend from source

services:
  mongo:
    image: mongo:3.6.3
    container_name: confac-test-mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: pwd
      MONGO_INITDB_DATABASE: confac-test
    volumes:
      - mongo-test-data:/data/db
    networks:
      - confac-test-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/confac-test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../confac/backend
      dockerfile: ../../confac-playwright/docker/backend.Dockerfile
    container_name: confac-test-backend
    ports:
      - "9001:9000"
    environment:
      ENVIRONMENT: test
      BUILD_VERSION: test
      LOGGING_FILE: ./logs
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USERNAME: admin
      MONGO_PASSWORD: pwd
      MONGO_DB: confac-test
      SERVER_HOST: 0.0.0.0
      PORT: 9000
      ENABLE_ROOT_TEMPLATES: 0
      EXCEL_SERVICE_URL: http://mock-excel:3001
      BILLIT_API_URL: http://mock-peppol:3002/v1
      BILLIT_API_KEY: test-api-key
      BILLIT_PARTY_ID: test-party-id
      JWT_SECRET: test-jwt-secret
      JWT_EXPIRES: 18000
      SUPERUSER: admin@confac.test
      DEFAULT_ROLE: admin
    volumes:
      - ../confac/backend/templates-example:/app/templates
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - confac-test-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/api"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ../confac/frontend
      dockerfile: ../../confac-playwright/docker/frontend.Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:9001
    container_name: confac-test-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - confac-test-net

  mock-peppol:
    build:
      context: ./mocks/peppol
      dockerfile: Dockerfile
    container_name: confac-test-mock-peppol
    ports:
      - "3002:3002"
    networks:
      - confac-test-net

  mock-excel:
    build:
      context: ./mocks/excel
      dockerfile: Dockerfile
    container_name: confac-test-mock-excel
    ports:
      - "3300:3001"
    networks:
      - confac-test-net

volumes:
  mongo-test-data:

networks:
  confac-test-net:
    driver: bridge
